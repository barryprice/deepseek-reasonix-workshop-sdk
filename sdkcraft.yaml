name: reasonix
adopt-info: reasonix
summary: DeepSeek-native AI coding agent for the terminal
description: |
  This SDK provides the Reasonix CLI, a DeepSeek-native AI coding agent that
  runs as a single static Go binary. Configuration, provider secrets, session
  history, and checkpoints under the Reasonix home directory are persisted on
  the host so they survive across workshop updates.
license: MIT

platforms:
  ubuntu@24.04:amd64:
  ubuntu@26.04:amd64:
  ubuntu@24.04:arm64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:arm64]
  ubuntu@26.04:arm64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:arm64]
  ubuntu@24.04:ppc64el:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:ppc64el]
  ubuntu@26.04:ppc64el:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:ppc64el]
  ubuntu@24.04:s390x:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:s390x]
  ubuntu@26.04:s390x:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:s390x]
  ubuntu@24.04:riscv64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:riscv64]
  ubuntu@26.04:riscv64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:riscv64]

plugs:
  reasonix-home:
    interface: mount
    workshop-target: /home/workshop/.reasonix

parts:
  reasonix:
    plugin: dump
    source: .
    source-type: local
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      curl -fLO "https://github.com/esengine/DeepSeek-Reasonix/releases/download/v${VERSION}/reasonix-linux-${CRAFT_ARCH_BUILD_FOR}.tar.gz"
      tar -xzf "reasonix-linux-${CRAFT_ARCH_BUILD_FOR}.tar.gz" -C "$CRAFT_PART_SRC" reasonix
      rm "reasonix-linux-${CRAFT_ARCH_BUILD_FOR}.tar.gz"
    organize:
      reasonix: usr/bin/reasonix
